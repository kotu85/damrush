<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1c2c1a" />
<title>Dam Rush</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #1c2c1a; color: #fff;
    font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
    overscroll-behavior: none; touch-action: none;
    user-select: none; -webkit-user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; image-rendering: -webkit-optimize-contrast; }
  #unmute {
    position: absolute; top: calc(env(safe-area-inset-top) + 8px); right: calc(env(safe-area-inset-right) + 8px);
    z-index: 5; padding: 8px 12px; border-radius: 999px;
    background: rgba(0,0,0,.55); color: #fff; border: 1px solid rgba(255,255,255,.18);
    font: 600 13px/1 ui-rounded, system-ui; backdrop-filter: blur(8px);
    display: none;
  }
  #unmute.show { display: block; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<button id="unmute" aria-label="Toggle sound">🔊</button>

<script>
"use strict";

// =====================================================================
// DAM RUSH — HTML5 Canvas Crossy-Road-style game
// =====================================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha: false });
const unmuteBtn = document.getElementById('unmute');

let DPR = Math.min(window.devicePixelRatio || 1, 2.5);
let CW = 0, CH = 0;          // canvas CSS pixels
let TILE = 64;               // tile size in CSS px (recomputed responsively)
let COLS = 9;                // columns of playfield
let LEFT_PAD = 0;            // CSS px to left of playfield
function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  // pick TILE so that ~9 columns fit on phones, more on iPad landscape
  const minDim = Math.min(w, h);
  TILE = Math.max(48, Math.min(96, Math.floor(minDim / 9)));
  COLS = Math.max(7, Math.min(15, Math.floor(w / TILE)));
  if (COLS % 2 === 0) COLS -= 1; // odd so player has a center
  LEFT_PAD = Math.floor((w - COLS * TILE) / 2);
  CW = w; CH = h;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = Math.floor(w * DPR);
  canvas.height = Math.floor(h * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.imageSmoothingEnabled = true;
}
window.addEventListener('resize', resize);
resize();

// =====================================================================
// Persistent save (uses window.storage when available)
// =====================================================================
const SAVE_KEY = 'damrush:save:v1';
const defaultSave = () => ({
  highScore: 0,
  coins: 0,
  unlocked: ['default'],
  selected: 'default',
  ach: { firstSplash:false, eagleBait:false, century:false, dam:false, fullLodge:false },
  muted: false,
});
let save = defaultSave();

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) save = Object.assign(defaultSave(), JSON.parse(raw));
  } catch (e) { /* fresh save */ }
  applyMuteUI();
}
function persist() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(save));
  } catch (e) {}
}

// Audio handles - declared early so applyMuteUI (called from loadSave) can reference them
let audioCtx = null;
let musicGain = null, sfxGain = null;

loadSave();

// =====================================================================
// Audio (Web Audio synthesis — no asset files needed)
// =====================================================================
function ensureAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain(); musicGain.gain.value = save.muted ? 0 : 0.18; musicGain.connect(audioCtx.destination);
    sfxGain   = audioCtx.createGain(); sfxGain.gain.value   = save.muted ? 0 : 0.55; sfxGain.connect(audioCtx.destination);
    startMusic();
  } catch (e) { audioCtx = null; }
}
function applyMuteUI() {
  unmuteBtn.classList.add('show');
  unmuteBtn.textContent = save.muted ? '🔇' : '🔊';
  if (audioCtx) {
    musicGain.gain.value = save.muted ? 0 : 0.18;
    sfxGain.gain.value   = save.muted ? 0 : 0.55;
  }
}
unmuteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  ensureAudio();
  save.muted = !save.muted;
  applyMuteUI();
  persist();
});

function blip(freq, dur, type='sine', vol=1, slideTo=null) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = type;
  const g = audioCtx.createGain();
  o.frequency.setValueAtTime(freq, t0);
  if (slideTo !== null) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g).connect(sfxGain);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function noiseBurst(dur, vol=0.5, lp=4000, hp=200) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * dur), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const lpf = audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=lp;
  const hpf = audioCtx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=hp;
  const g = audioCtx.createGain(); g.gain.value = vol;
  src.connect(hpf).connect(lpf).connect(g).connect(sfxGain);
  src.start(t0); src.stop(t0 + dur + 0.02);
}

const sfx = {
  hop:    () => { blip(280, 0.07, 'sine', 0.3, 380); },
  logHop: () => { noiseBurst(0.06, 0.35, 1200, 300); blip(220, 0.06, 'square', 0.15, 180); },
  splash: () => { noiseBurst(0.35, 0.6, 6000, 400); blip(900, 0.2, 'sine', 0.12, 200); },
  coin:   () => { blip(900, 0.06,'square', 0.2); setTimeout(()=>blip(1400,0.09,'square',0.2), 60); },
  squish: () => { noiseBurst(0.25, 0.7, 2500, 80); blip(120, 0.4, 'square', 0.25, 50); },
  truck:  () => { blip(160, 0.35, 'square', 0.25); },
  eagle:  () => { blip(1500, 0.5, 'sawtooth', 0.3, 400); blip(1700, 0.5, 'sawtooth', 0.2, 500); },
  train:  () => { blip(140, 0.6, 'square', 0.3); blip(180, 0.6, 'square', 0.2); },
  tail:   () => { noiseBurst(0.06, 0.25, 1800, 400); blip(120, 0.05, 'sine', 0.18, 80); },
  unlock: () => { [523, 659, 784, 1047].forEach((f,i)=>setTimeout(()=>blip(f, 0.18, 'square', 0.22), i*90)); },
  spin:   () => { for (let i=0;i<8;i++) setTimeout(()=>blip(400+i*60, 0.05, 'square', 0.18), i*60); },
};

// Simple banjo-style background music loop
let musicTimer = null;
function startMusic() {
  if (!audioCtx || musicTimer) return;
  // bluegrass-ish chord arpeggio in G
  const pattern = [
    [196, 0.18], [294, 0.18], [392, 0.18], [294, 0.18],
    [220, 0.18], [330, 0.18], [440, 0.18], [330, 0.18],
    [247, 0.18], [330, 0.18], [392, 0.18], [330, 0.18],
    [196, 0.18], [294, 0.18], [392, 0.18], [494, 0.18],
  ];
  let i = 0;
  const tick = () => {
    if (!audioCtx) return;
    const [f, d] = pattern[i % pattern.length];
    // banjo pluck: square + sine harmonic, fast decay
    const t0 = audioCtx.currentTime;
    const o1 = audioCtx.createOscillator(); o1.type='triangle'; o1.frequency.value=f;
    const o2 = audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value=f*2;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.6, t0+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+d);
    o1.connect(g); o2.connect(g); g.connect(musicGain);
    o1.start(t0); o2.start(t0); o1.stop(t0+d+0.02); o2.stop(t0+d+0.02);
    i++;
    musicTimer = setTimeout(tick, 220);
  };
  tick();
}

// =====================================================================
// Color palette
// =====================================================================
const PAL = {
  skyDay:    '#9ed6e8',
  skyDusk:   '#f0a36b',
  skyNight:  '#1c2740',
  grass:     '#5e8c3a',
  grassDark: '#4a7030',
  grassEdge: '#3b5824',
  road:      '#3a3a3f',
  roadEdge:  '#2a2a2e',
  stripe:    '#dcc36a',
  river:     '#3d6e8a',
  riverDk:   '#2c5470',
  trackWood: '#7a543a',
  trackEdge: '#503424',
  rail:      '#a0a4ad',
  beaverBody:'#6b4423',
  beaverDk:  '#4a2f18',
  beaverLt:  '#a47443',
  tooth:     '#fff7d6',
  log:       '#8b6332',
  logDk:     '#5d3f1c',
  logLight:  '#a87a44',
  pineLt:    '#4a7a3a',
  pineDk:    '#2e5328',
  trunk:     '#3a2818',
  bush:      '#5a8a3e',
  rock:      '#6e6a64',
  shroomCap: '#c14d4d',
  shroomStem:'#f0e6c8',
  truckRed:  '#b04830',
  truckBlue: '#4a6fb0',
  truckYellow:'#c2a030',
  truckBody: '#2c2820',
  window:    '#9ec8e0',
  coin:      '#f5c842',
  coinHi:    '#fff1a8',
  lily:      '#3d8e4c',
  lilyFlower:'#f6c6dc',
  trainBody: '#4a3026',
  trainAccent:'#a0382c',
  shadow:    'rgba(0,0,0,0.28)',
};

// =====================================================================
// Game state
// =====================================================================
const STATE = { MENU:'menu', PLAYING:'playing', DEAD:'dead', SELECT:'select' };
let state = STATE.MENU;

const game = {
  rows: new Map(),       // worldRow -> Row
  startRow: 0,           // earliest row that exists
  endRow: 0,             // furthest row generated
  player: null,
  camRow: 0,             // smoothed
  camTargetRow: 0,
  score: 0,
  coins: 0,              // run coins (deposited on death)
  particles: [],
  eagle: null,
  rainOn: false,
  rainParticles: [],
  rainTimer: 0,
  shake: 0,
  trainHorn: 0,
  pawprints: [],
  popups: [],            // floating texts
  lastDeath: null,       // {cause:'truck'|'splash'|'eagle'|'train'}
  spinResult: null,
  spinAnim: 0,
};

// =====================================================================
// World generation
// =====================================================================
const LANE = { GRASS:'grass', ROAD:'road', RIVER:'river', TRACK:'track' };

function rng(seed) {
  let s = seed | 0;
  return () => { s = (s * 1664525 + 1013904223) | 0; return ((s >>> 0) / 4294967296); };
}
function pick(arr, r) { return arr[Math.floor(r()*arr.length)]; }

function makeRow(rowIdx) {
  const r = rng(rowIdx * 9301 + 49297);
  // First few rows: safe grass
  if (rowIdx <= 2) {
    return safeGrass(rowIdx, r);
  }
  // Difficulty: more aggressive after milestones
  const sc = Math.max(0, rowIdx);
  const speedMult = 1 + Math.min(1.4, sc/180);
  // Pick lane type weighted
  let weights;
  if (sc < 30)  weights = { grass:5, road:3, river:2, track:0.6 };
  else if (sc < 100) weights = { grass:3.5, road:3.5, river:3, track:1 };
  else weights = { grass:2.8, road:3.5, river:3.2, track:1.4 };
  // Avoid 3 same lanes in a row of hazard
  const last = game.rows.get(rowIdx-1);
  const last2 = game.rows.get(rowIdx-2);
  if (last && last2 && last.type === last2.type && last.type !== LANE.GRASS) {
    weights.grass *= 2.2;
  }
  // Avoid two river/track immediately
  if (last && (last.type === LANE.RIVER || last.type === LANE.TRACK)) {
    if (Math.random() < 0.55) weights.grass *= 2;
  }
  const total = weights.grass + weights.road + weights.river + weights.track;
  let pickV = r() * total;
  let type;
  if ((pickV -= weights.grass) < 0) type = LANE.GRASS;
  else if ((pickV -= weights.road) < 0) type = LANE.ROAD;
  else if ((pickV -= weights.river) < 0) type = LANE.RIVER;
  else type = LANE.TRACK;

  switch (type) {
    case LANE.GRASS: return grassRow(rowIdx, r);
    case LANE.ROAD:  return roadRow(rowIdx, r, speedMult);
    case LANE.RIVER: return riverRow(rowIdx, r, speedMult);
    case LANE.TRACK: return trackRow(rowIdx, r, speedMult);
  }
}

function safeGrass(rowIdx, r) {
  return { type: LANE.GRASS, rowIdx, decor: [], coin: false, blockers: new Set() };
}

function grassRow(rowIdx, r) {
  const decor = [];
  const blockers = new Set();
  const playfieldCols = COLS;
  const baseChance = Math.min(0.32, 0.16 + rowIdx*0.0008);
  const maxTrees = Math.max(1, Math.floor(playfieldCols * 0.45));

  // Shuffle col order so capped trees aren't biased to the left side
  const colOrder = [];
  for (let c = 0; c < playfieldCols; c++) colOrder.push(c);
  for (let i = colOrder.length - 1; i > 0; i--) {
    const j = Math.floor(r() * (i + 1));
    [colOrder[i], colOrder[j]] = [colOrder[j], colOrder[i]];
  }

  // Pass 1: place trees one at a time. Undo any placement that would
  // strand an open column with blocked neighbors on both sides.
  for (const c of colOrder) {
    if (blockers.size >= maxTrees) break;
    if (r() >= baseChance) continue;
    blockers.add(c);
    if (!isSolvableRow(blockers, playfieldCols)) blockers.delete(c);
  }

  // Pass 2: ensure connectivity from the previous grass row's open columns.
  // From every prev-open col, the player must be able to advance via either
  // a direct forward hop or a single sidestep on the prev row.
  const prev = game.rows.get(rowIdx - 1);
  if (prev && prev.type === LANE.GRASS && prev.blockers) {
    const prevOpen = [];
    for (let c = 0; c < playfieldCols; c++) if (!prev.blockers.has(c)) prevOpen.push(c);
    for (const P of prevOpen) {
      if (canAdvanceFrom(P, prev.blockers, blockers, playfieldCols)) continue;
      // Free a path by removing the tree most likely to help: P, then P+1, then P-1
      const tries = [P, P+1, P-1].filter(c => c >= 0 && c < playfieldCols && blockers.has(c));
      for (const t of tries) {
        blockers.delete(t);
        if (canAdvanceFrom(P, prev.blockers, blockers, playfieldCols)) break;
        blockers.add(t);
      }
    }
  }

  // Build decor
  for (const c of blockers) {
    decor.push({ kind:'tree', col:c, h: 0.8 + r()*0.5, seed: r() });
  }
  for (let c = 0; c < playfieldCols; c++) {
    if (blockers.has(c)) continue;
    const dr = r();
    if (dr < 0.06) decor.push({ kind:'bush', col:c, seed:r() });
    else if (dr < 0.09) decor.push({ kind:'mushroom', col:c, seed:r() });
    else if (dr < 0.105) decor.push({ kind:'rock', col:c, seed:r() });
  }

  // coins on grass (avoiding tree tiles)
  const coins = new Set();
  for (let c = 0; c < playfieldCols; c++) {
    if (blockers.has(c)) continue;
    if (r() < 0.08 + Math.min(0.18, rowIdx*0.0008)) coins.add(c);
  }
  return { type: LANE.GRASS, rowIdx, decor, blockers, coins };
}

// True iff every open col on the row has at least one open neighbor (or edge
// counts as a wall). Prevents stranded single tiles between two trees.
function isSolvableRow(blockers, cols) {
  let openCount = 0;
  for (let c = 0; c < cols; c++) {
    if (blockers.has(c)) continue;
    openCount++;
    const leftBlocked  = c === 0        || blockers.has(c - 1);
    const rightBlocked = c === cols - 1 || blockers.has(c + 1);
    if (leftBlocked && rightBlocked) return false;
  }
  return openCount > 0;
}

// True iff a player at col P on the previous row can reach this row by either
// hopping forward (col P open here) or sidestepping once on the prev row to
// an adjacent col that's open on both rows.
function canAdvanceFrom(P, prevBlockers, thisBlockers, cols) {
  if (!thisBlockers.has(P)) return true;
  for (const sc of [P - 1, P + 1]) {
    if (sc < 0 || sc >= cols) continue;
    if (!prevBlockers.has(sc) && !thisBlockers.has(sc)) return true;
  }
  return false;
}

function roadRow(rowIdx, r, speedMult) {
  const dir = r() < 0.5 ? 1 : -1;
  const baseSpeed = (1.2 + r()*1.6) * speedMult; // tiles per second
  const speed = baseSpeed * dir;
  const vehicles = [];
  const vehicleType = pick(['truck','atv','roller'], r);
  // initial spawn
  const gap = 2.5 + r()*3.5;
  let x = -2 + r()*COLS;
  while (x < COLS + 4) {
    vehicles.push(makeVehicle(vehicleType, x, dir, r));
    x += gap + r()*1.5;
  }
  return { type: LANE.ROAD, rowIdx, speed, dir, vehicles, vehicleType };
}

function makeVehicle(type, x, dir, r) {
  const colorPool = [PAL.truckRed, PAL.truckBlue, PAL.truckYellow];
  if (type === 'truck')  return { type, x, w: 2.0, h: 0.9, color: colorPool[Math.floor(r()*3)] };
  if (type === 'atv')    return { type, x, w: 1.0, h: 0.8, color: colorPool[Math.floor(r()*3)] };
  if (type === 'roller') return { type, x, w: 1.4, h: 0.9, color: PAL.logLight };
}

function riverRow(rowIdx, r, speedMult) {
  const dir = r() < 0.5 ? 1 : -1;
  const speed = (0.7 + r()*1.1) * speedMult * dir;
  const logs = [];
  let x = -2 + r()*COLS;
  while (x < COLS + 4) {
    const w = 2 + Math.floor(r()*3); // 2,3,4
    logs.push({ x, w, hasLily: r() < 0.18, lilyOffset: 0.5 + r()*(w-1.0), lilyHasFlower: r()<0.4, hasCoin: r()<0.35 });
    x += w + 1.2 + r()*2.5;
  }
  return { type: LANE.RIVER, rowIdx, speed, dir, logs };
}

function trackRow(rowIdx, r, speedMult) {
  return { type: LANE.TRACK, rowIdx, train: null, warnT: 0, cooldown: 3 + r()*5, dir: r()<0.5?1:-1, speedMult };
}

function ensureRows() {
  const aheadNeed = game.camTargetRow + 22;
  const behindNeed = game.camTargetRow - 10;
  while (game.endRow < aheadNeed) {
    game.endRow++;
    game.rows.set(game.endRow, makeRow(game.endRow));
  }
  // prune behind
  for (const [k] of game.rows) {
    if (k < behindNeed) game.rows.delete(k);
  }
  if (behindNeed > game.startRow) game.startRow = behindNeed;
}

function initWorld() {
  game.rows.clear();
  game.startRow = -6;
  game.endRow = -1;
  for (let r = -6; r <= 5; r++) game.rows.set(r, safeGrass(r, rng(r)));
  game.endRow = 5;
  // a few procedural ones to start
  for (let r = 6; r <= 18; r++) game.rows.set(r, makeRow(r)); 
  game.endRow = 18;
  game.particles.length = 0;
  game.pawprints.length = 0;
  game.popups.length = 0;
  game.rainParticles.length = 0;
  game.rainOn = false;
  game.rainTimer = 0;
  game.eagle = null;
  game.shake = 0;
  game.score = 0;
  game.coins = 0;
  game.lastDeath = null;
  game.player = makePlayer();
  game.camTargetRow = 0;
  game.camRow = 0;
}

// =====================================================================
// Player
// =====================================================================
function makePlayer() {
  return {
    row: 0,
    col: Math.floor(COLS/2),
    x: Math.floor(COLS/2),     // continuous col (when on log)
    y: 0,                      // continuous row (smoothed)
    targetRow: 0, targetCol: Math.floor(COLS/2),
    hopT: 0, hopDur: 0.16,     // animation time
    facing: 'up',
    onLog: null,               // {row, log, offset}
    swimT: 0,                  // time since fell in water (resets on log)
    idleT: 0,                  // time since last move
    deadT: 0,
    alive: true,
    tailSlapT: 0,
    skin: save.selected,
  };
}

function tryMove(dRow, dCol, facing) {
  const p = game.player;
  if (!p.alive || p.hopT > 0) return;
  let nRow = p.row + dRow;
  let nCol = p.col + dCol;
  // playfield bounds
  if (nCol < 0 || nCol >= COLS) return;
  if (nRow < game.startRow + 1) return;

  const isBlocked = (lane, col) =>
    lane && lane.type === LANE.GRASS && lane.blockers && lane.blockers.has(col);

  const targetRow = game.rows.get(nRow);
  const blocked = isBlocked(targetRow, nCol);

  if (blocked) {
    // Auto-sidestep when trying to move forward into a tree.
    // Hop to whichever side opens a path; prefer the side whose forward tile is also clear.
    if (dRow === 1 && dCol === 0) {
      const curRow = game.rows.get(p.row);
      const rightOk = p.col + 1 < COLS && !isBlocked(curRow, p.col + 1);
      const leftOk  = p.col - 1 >= 0   && !isBlocked(curRow, p.col - 1);
      const rightForwardOk = rightOk && !isBlocked(targetRow, p.col + 1);
      const leftForwardOk  = leftOk  && !isBlocked(targetRow, p.col - 1);

      let chose = null;
      if (rightForwardOk && leftForwardOk) chose = Math.random() < 0.5 ? 'r' : 'l';
      else if (rightForwardOk) chose = 'r';
      else if (leftForwardOk)  chose = 'l';
      else if (rightOk && leftOk) chose = Math.random() < 0.5 ? 'r' : 'l';
      else if (rightOk) chose = 'r';
      else if (leftOk)  chose = 'l';

      if (!chose) return; // boxed in
      nRow = p.row;
      nCol = p.col + (chose === 'r' ? 1 : -1);
      facing = chose === 'r' ? 'right' : 'left';
    } else {
      return; // sideways/back into a tree just doesn't move
    }
  }

  // start hop
  p.facing = facing;
  if (p.onLog) p.onLog = null;
  p.targetRow = nRow;
  p.targetCol = nCol;
  p.hopT = p.hopDur;
  p.idleT = 0;
  sfx.hop();
  if (navigator.vibrate) navigator.vibrate(8);
  // mud pawprint on grass leaving
  const fromRow = game.rows.get(p.row);
  if (fromRow && fromRow.type === LANE.GRASS) {
    game.pawprints.push({ x: p.col + 0.5, y: p.row + 0.5, t: 5 });
  }
}

function killPlayer(cause) {
  const p = game.player;
  if (!p.alive) return;
  p.alive = false;
  p.deadT = 0;
  game.lastDeath = { cause };
  game.shake = 0.45;
  // deposit coins
  save.coins += game.coins;
  if (game.score > save.highScore) {
    save.highScore = game.score;
  }
  // achievements
  if (cause === 'splash') save.ach.firstSplash = true;
  if (cause === 'eagle') save.ach.eagleBait = true;
  if (game.score >= 100) save.ach.century = true;
  if (game.score >= 500) save.ach.dam = true;
  persist();
  setTimeout(() => { state = STATE.DEAD; }, 600);
  if (cause === 'splash') sfx.splash();
  else if (cause === 'eagle') sfx.eagle();
  else if (cause === 'train') sfx.train();
  else { sfx.squish(); sfx.truck(); }
  if (navigator.vibrate) navigator.vibrate([20, 40, 60]);
}

// =====================================================================
// Update / collision
// =====================================================================
function update(dt) {
  if (state !== STATE.PLAYING) {
    // gentle ambient updates
    updateRain(dt);
    return;
  }
  const p = game.player;

  // Hop tween
  if (p.hopT > 0) {
    p.hopT -= dt;
    const t = 1 - Math.max(0, p.hopT) / p.hopDur;
    const e = t; // linear; we add arc via render
    p.y = p.row + (p.targetRow - p.row) * e;
    p.x = p.col + (p.targetCol - p.col) * e;
    if (p.hopT <= 0) {
      p.row = p.targetRow;
      p.col = p.targetCol;
      p.x = p.col; p.y = p.row;
      onLand();
    }
  }

  // Idle / eagle
  if (p.alive) {
    p.idleT += dt;
    p.tailSlapT += dt;
    if (p.tailSlapT >= 2.0 && p.hopT <= 0) {
      sfx.tail();
      p.tailSlapT = 0;
      // small ground ring
      game.particles.push({ kind:'ring', x: p.x+0.5, y: p.y+0.5, r:0.1, life:0.4, max:0.4 });
    }
    if (p.idleT >= 5 && !game.eagle) {
      // spawn eagle
      game.eagle = { x: p.x+0.5, y: p.y - 6, t: 0, target: { x: p.x+0.5, y: p.y+0.5 }, phase:'dive', dur: 1.0 };
    }
    // also check getting too far behind camera (out of frame back)
    if (p.row < game.camRow - 6) {
      // squashed by edge — eagle from behind
      if (!game.eagle) game.eagle = { x: p.x+0.5, y: p.y-4, t:0, target:{x:p.x+0.5,y:p.y+0.5}, phase:'dive', dur:0.7 };
    }
  }

  // Eagle behavior - commits to a target spot, so player can hop away to dodge
  if (game.eagle) {
    const e = game.eagle;
    e.t += dt;
    if (e.phase === 'dive') {
      const k = Math.min(1, e.t / e.dur);
      e.x = e.target.x;
      e.y = (e.target.y - 6) + k * 6;
      if (k >= 1) {
        if (p.alive &&
            Math.abs(p.x + 0.5 - e.target.x) < 0.6 &&
            Math.abs(p.y + 0.5 - e.target.y) < 0.6) {
          killPlayer('eagle');
        }
        e.phase = 'rise'; e.t = 0; e.riseFromY = e.y;
      }
    } else if (e.phase === 'rise') {
      const k = Math.min(1, e.t / 0.9);
      e.y = e.riseFromY - k * 6;
      if (k >= 1) game.eagle = null;
    }
  }

  // World streaming
  ensureRows();

  // Lane updates
  for (const lane of game.rows.values()) {
    if (lane.type === LANE.ROAD) {
      for (const v of lane.vehicles) {
        v.x += lane.speed * dt;
      }
      // wrap around (recycle off-screen)
      const minX = -3, maxX = COLS + 3;
      for (const v of lane.vehicles) {
        if (lane.dir > 0 && v.x > maxX) {
          // find leftmost x and place behind it
          let lm = Infinity; for (const u of lane.vehicles) if (u !== v) lm = Math.min(lm, u.x);
          v.x = Math.min(-2, lm - 2.5 - Math.random()*1.8);
        } else if (lane.dir < 0 && v.x < minX) {
          let rm = -Infinity; for (const u of lane.vehicles) if (u !== v) rm = Math.max(rm, u.x);
          v.x = Math.max(COLS + 2, rm + 2.5 + Math.random()*1.8);
        }
      }
    } else if (lane.type === LANE.RIVER) {
      for (const lg of lane.logs) lg.x += lane.speed * dt;
      const minX = -5, maxX = COLS + 4;
      for (const lg of lane.logs) {
        if (lane.dir > 0 && lg.x - lg.w > maxX) {
          let lm = Infinity; for (const u of lane.logs) if (u !== lg) lm = Math.min(lm, u.x);
          lg.x = Math.min(-lg.w, lm - lg.w - 1.2 - Math.random()*1.5);
        } else if (lane.dir < 0 && lg.x + lg.w < minX) {
          let rm = -Infinity; for (const u of lane.logs) if (u !== lg) rm = Math.max(rm, u.x + u.w);
          lg.x = Math.max(COLS, rm + 1.2 + Math.random()*1.5);
        }
      }
    } else if (lane.type === LANE.TRACK) {
      lane.cooldown -= dt;
      if (!lane.train && lane.cooldown <= 0 && lane.warnT <= 0) {
        // start warning if player anywhere within ~6 rows
        if (Math.abs(lane.rowIdx - p.row) < 8) {
          lane.warnT = 1.4;
          game.trainHorn = 1;
          sfx.train();
        }
      }
      if (lane.warnT > 0) {
        lane.warnT -= dt;
        if (lane.warnT <= 0) {
          // spawn train
          const speed = 14 * lane.speedMult * lane.dir;
          const startX = lane.dir > 0 ? -8 : COLS + 8;
          lane.train = { x: startX, w: 8, speed };
          game.shake = Math.max(game.shake, 0.6);
        }
      }
      if (lane.train) {
        lane.train.x += lane.train.speed * dt;
        if ((lane.dir > 0 && lane.train.x > COLS + 10) ||
            (lane.dir < 0 && lane.train.x + lane.train.w < -10)) {
          lane.train = null;
          lane.cooldown = 4 + Math.random()*5;
        }
      }
    }
  }

  // Player log-follow happens AFTER lane updates so log position is current
  if (p.alive && p.hopT <= 0 && p.onLog) {
    const lane = game.rows.get(p.row);
    if (lane && lane.type === LANE.RIVER) {
      p.x = p.onLog.log.x + p.onLog.offset;
      if (p.x < -0.5 || p.x > COLS - 0.5) killPlayer('splash');
    } else {
      p.onLog = null;
    }
  }

  // Player environment effects (river/log/road/track collisions)
  if (p.alive) {
    const lane = game.rows.get(p.row);
    if (lane) {
      if (lane.type === LANE.ROAD && p.hopT <= 0) {
        for (const v of lane.vehicles) {
          if (Math.abs(v.x - p.x) < (v.w/2 + 0.4)) {
            killPlayer('truck');
            break;
          }
        }
      } else if (lane.type === LANE.RIVER) {
        if (!p.onLog && p.hopT <= 0) {
          // Attach if the player tile center sits over any log
          let attached = null;
          for (const lg of lane.logs) {
            const a = lg.x - lg.w/2, b = lg.x + lg.w/2;
            if (p.x + 0.5 >= a && p.x + 0.5 <= b) { attached = lg; break; }
          }
          if (attached) {
            p.onLog = { log: attached, offset: p.x - attached.x };
            p.swimT = 0;
            // pickup lily coin
            if (attached.hasCoin) {
              attached.hasCoin = false;
              addCoin(p.x+0.5, p.y+0.5, 3);
            }
            sfx.logHop();
          } else {
            // First frame in water: splash
            if (p.swimT === 0) sfx.splash();
            p.swimT += dt;
            if (Math.random() < 12 * dt) {
              game.particles.push({kind:'splash', x: p.x+0.5, y: p.y+0.5, vx:(Math.random()-0.5)*2, vy:-Math.random()*2-1, life:0.5, max:0.5});
            }
            if (p.swimT >= 0.45) killPlayer('splash');
          }
        }
      } else if (lane.type === LANE.TRACK) {
        if (lane.train && p.hopT <= 0) {
          const tx1 = lane.train.x, tx2 = lane.train.x + lane.train.w;
          if (p.x + 0.5 >= tx1 - 0.2 && p.x + 0.5 <= tx2 + 0.2) {
            killPlayer('train');
          }
        }
      } else if (lane.type === LANE.GRASS) {
        // pickup grass coin
        if (lane.coins && lane.coins.has(p.col)) {
          lane.coins.delete(p.col);
          addCoin(p.x+0.5, p.y+0.5, 1);
        }
      }
    }
  }

  // Camera follow
  game.camTargetRow = Math.max(game.camTargetRow, p.row + 2);
  game.camRow = lerp(game.camRow, game.camTargetRow, Math.min(1, dt * 6));

  // Score = max forward row reached
  if (p.row > game.score) {
    game.score = p.row;
    if (game.score === 100 && !save.ach.century) { addPopup("CENTURY BEAVER!", "#fff1a8"); sfx.unlock(); }
    if (game.score === 500 && !save.ach.dam) { addPopup("DAM BUILDER!", "#fff1a8"); sfx.unlock(); }
    if (game.score === 75) maybeStartRain();
  }

  // Particles
  for (const pa of game.particles) {
    pa.life -= dt;
    if (pa.kind === 'splash') {
      pa.x += pa.vx * dt; pa.y += pa.vy * dt; pa.vy += 6*dt;
    } else if (pa.kind === 'ring') {
      pa.r = (1 - pa.life/pa.max) * 0.6;
    } else if (pa.kind === 'coin') {
      pa.y -= dt * 1.6;
    }
  }
  game.particles = game.particles.filter(p => p.life > 0);

  // Pawprints fade
  for (const pp of game.pawprints) pp.t -= dt;
  game.pawprints = game.pawprints.filter(pp => pp.t > 0);

  // Popups
  for (const pp of game.popups) { pp.t -= dt; pp.y -= dt * 30; }
  game.popups = game.popups.filter(pp => pp.t > 0);

  // Rain
  updateRain(dt);

  // Shake
  if (game.shake > 0) game.shake = Math.max(0, game.shake - dt*1.6);
  if (game.trainHorn > 0) game.trainHorn = Math.max(0, game.trainHorn - dt*0.6);

  // Selected skin update (in case changed)
  p.skin = save.selected;
}

function onLand() {
  const p = game.player;
  p.idleT = 0;
  p.tailSlapT = 0;
  const lane = game.rows.get(p.row);
  if (!lane || lane.type !== LANE.RIVER) {
    p.swimT = 0; // safe ground (or road/track) — clear any leftover water timer
  }
}

function addCoin(x, y, amt) {
  game.coins += amt;
  game.particles.push({kind:'coin', x, y, life:0.7, max:0.7, amt});
  sfx.coin();
}
function addPopup(text, color) {
  game.popups.push({ text, color, x: CW/2, y: CH*0.4, t: 1.6 });
}

function lerp(a,b,t) { return a + (b-a) * t; }

function maybeStartRain() {
  if (Math.random() < 0.6) game.rainOn = true;
}
function updateRain(dt) {
  if (!game.rainOn) return;
  game.rainTimer += dt;
  // spawn drops
  for (let i=0;i<5;i++) {
    game.rainParticles.push({ x: Math.random()*CW, y: -10, vy: 600 + Math.random()*300, len: 12 + Math.random()*10 });
  }
  for (const d of game.rainParticles) { d.y += d.vy * dt; }
  game.rainParticles = game.rainParticles.filter(d => d.y < CH + 20);
  if (game.rainTimer > 18) { game.rainOn = false; game.rainTimer = 0; }
}

// =====================================================================
// Rendering
// =====================================================================
function worldToScreen(wx, wy) {
  // wx in cols (0..COLS), wy in rows (relative to camRow)
  const sx = LEFT_PAD + wx * TILE;
  const anchor = CH * 0.62;
  const sy = anchor - (wy - game.camRow) * TILE;
  return [sx, sy];
}

function tileScreen(col, row) {
  return worldToScreen(col, row);
}

function render() {
  // background gradient by time-of-day
  const sky = skyColor();
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, CW, CH);
  // distant mountains
  drawDistantMountains();

  // shake offset
  let shx = 0, shy = 0;
  if (game.shake > 0) {
    shx = (Math.random()-0.5) * game.shake * 14;
    shy = (Math.random()-0.5) * game.shake * 14;
  }
  ctx.save();
  ctx.translate(shx, shy);

  // draw lanes from camRow - 8 to camRow + 14
  const minR = Math.floor(game.camRow - 8);
  const maxR = Math.ceil(game.camRow + 14);
  for (let r = minR; r <= maxR; r++) {
    const lane = game.rows.get(r);
    if (!lane) continue;
    drawLane(lane);
  }
  // entities & player layer-sorted by row (ascending = further back drawn first)
  for (let r = maxR; r >= minR; r--) {
    const lane = game.rows.get(r);
    if (!lane) continue;
    drawLaneEntities(lane);
    if (game.player && game.player.row === r && state !== STATE.MENU) drawPlayer();
  }

  // pawprints (overlay)
  for (const pp of game.pawprints) {
    const [sx, sy] = worldToScreen(pp.x, pp.y);
    ctx.fillStyle = `rgba(60,40,20,${Math.min(0.5, pp.t/5)})`;
    ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx-4, sy+4, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+4, sy+4, 2.2, 0, Math.PI*2); ctx.fill();
  }

  // particles (foreground)
  for (const pa of game.particles) {
    const [sx, sy] = worldToScreen(pa.x, pa.y);
    if (pa.kind === 'splash') {
      ctx.fillStyle = `rgba(180,220,235,${Math.max(0,pa.life/pa.max)})`;
      ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI*2); ctx.fill();
    } else if (pa.kind === 'ring') {
      ctx.strokeStyle = `rgba(255,255,255,${Math.max(0,pa.life/pa.max)*0.55})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, pa.r * TILE, 0, Math.PI*2); ctx.stroke();
    } else if (pa.kind === 'coin') {
      ctx.fillStyle = `rgba(255,225,120,${Math.max(0,pa.life/pa.max)})`;
      ctx.font = `bold ${Math.floor(TILE*0.36)}px ui-rounded, system-ui`;
      ctx.textAlign = 'center';
      ctx.fillText('+' + pa.amt, sx, sy);
    }
  }

  // eagle
  if (game.eagle) drawEagle(game.eagle);

  // train horn warning red flash
  if (game.trainHorn > 0) {
    ctx.fillStyle = `rgba(255,40,40,${0.18 * game.trainHorn})`;
    ctx.fillRect(0, 0, CW, CH);
  }

  ctx.restore();

  // rain overlay
  if (game.rainOn) {
    ctx.strokeStyle = 'rgba(180,210,230,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (const d of game.rainParticles) {
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 4, d.y + d.len);
    }
    ctx.stroke();
  }

  // night vignette
  const dayFactor = dayPhase();
  if (dayFactor > 0.4) {
    const v = (dayFactor - 0.4) * 1.0;
    const grd = ctx.createRadialGradient(CW/2, CH/2, Math.min(CW,CH)*0.2, CW/2, CH/2, Math.max(CW,CH)*0.7);
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(1, `rgba(0,0,0,${0.6*v})`);
    ctx.fillStyle = grd; ctx.fillRect(0,0,CW,CH);
  }

  // popups
  for (const pp of game.popups) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, pp.t);
    ctx.fillStyle = pp.color || '#fff';
    ctx.font = `900 ${Math.floor(TILE*0.55)}px ui-rounded, system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.strokeText(pp.text, pp.x, pp.y);
    ctx.fillText(pp.text, pp.x, pp.y);
    ctx.restore();
  }

  // HUD / Menus
  if (state === STATE.PLAYING) drawHUD();
  if (state === STATE.MENU) drawMenu();
  if (state === STATE.DEAD) drawDead();
  if (state === STATE.SELECT) drawSelect();
}

function dayPhase() {
  // 0 = day, 1 = night based on score
  const s = game.score;
  if (s < 30) return Math.max(0, s/200);
  if (s < 120) return 0.15 + (s-30)/180;  // up to ~0.65
  return Math.min(0.9, 0.65 + (s-120)/600);
}

function skyColor() {
  const p = dayPhase();
  // mix daysky -> dusk -> night
  const c1 = hex(PAL.skyDay);
  const c2 = hex(PAL.skyDusk);
  const c3 = hex(PAL.skyNight);
  let r,g,b;
  if (p < 0.5) {
    const k = p / 0.5;
    r = c1[0] + (c2[0]-c1[0])*k;
    g = c1[1] + (c2[1]-c1[1])*k;
    b = c1[2] + (c2[2]-c1[2])*k;
  } else {
    const k = (p - 0.5) / 0.5;
    r = c2[0] + (c3[0]-c2[0])*k;
    g = c2[1] + (c3[1]-c2[1])*k;
    b = c2[2] + (c3[2]-c2[2])*k;
  }
  return `rgb(${r|0},${g|0},${b|0})`;
}
function hex(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

function drawDistantMountains() {
  // simple silhouette
  const horizonY = CH * 0.42;
  ctx.fillStyle = darkenSky(0.18);
  ctx.beginPath();
  ctx.moveTo(0, horizonY + 10);
  let x = 0;
  while (x < CW) {
    ctx.lineTo(x, horizonY - 30 - Math.sin(x*0.012)*22 - Math.sin(x*0.005+1)*12);
    x += 24;
  }
  ctx.lineTo(CW, horizonY + 10); ctx.closePath(); ctx.fill();

  ctx.fillStyle = darkenSky(0.32);
  ctx.beginPath();
  ctx.moveTo(0, horizonY + 18);
  x = 0;
  while (x < CW) {
    ctx.lineTo(x, horizonY - 14 - Math.sin(x*0.018+0.6)*16 - Math.sin(x*0.007+2)*8);
    x += 24;
  }
  ctx.lineTo(CW, horizonY + 18); ctx.closePath(); ctx.fill();
}
function darkenSky(amt) {
  const [r,g,b] = hex(skyColorHex());
  return `rgb(${(r*(1-amt))|0},${(g*(1-amt))|0},${(b*(1-amt))|0})`;
}
function skyColorHex() {
  const p = dayPhase();
  if (p < 0.5) return PAL.skyDusk;
  return PAL.skyNight;
}

// Lane base draws
function drawLane(lane) {
  const [, sy] = worldToScreen(0, lane.rowIdx);
  const x0 = LEFT_PAD;
  const w  = COLS * TILE;
  const top = sy - TILE;
  const fillTop = top;
  const fillH = TILE;

  if (lane.type === LANE.GRASS) {
    // alternating grass shades
    const stripe = (((lane.rowIdx % 2) + 2) % 2 === 0) ? PAL.grass : PAL.grassDark;
    ctx.fillStyle = stripe;
    ctx.fillRect(x0, fillTop, w, fillH);
    // edges
    ctx.fillStyle = PAL.grassEdge;
    ctx.fillRect(x0, fillTop + fillH - 4, w, 4);
    // little tufts
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    for (let i=0;i<COLS;i++) {
      ctx.fillRect(x0 + i*TILE + 6, fillTop + 8 + ((i*7)%(TILE-16)), 3, 2);
    }
    // coins
    if (lane.coins) {
      for (const c of lane.coins) {
        drawCoin(x0 + c*TILE + TILE/2, fillTop + TILE/2);
      }
    }
  } else if (lane.type === LANE.ROAD) {
    ctx.fillStyle = PAL.road;
    ctx.fillRect(x0, fillTop, w, fillH);
    ctx.fillStyle = PAL.roadEdge;
    ctx.fillRect(x0, fillTop, w, 3);
    ctx.fillRect(x0, fillTop + fillH - 3, w, 3);
    // dashed center stripe
    ctx.fillStyle = PAL.stripe;
    const dashW = 18, dashGap = 14;
    let dx = ((performance.now()*0.0005 * 0)) % (dashW + dashGap);
    for (let x = x0 + dx; x < x0 + w; x += dashW + dashGap) {
      ctx.fillRect(x, fillTop + fillH/2 - 2, dashW, 4);
    }
  } else if (lane.type === LANE.RIVER) {
    ctx.fillStyle = PAL.river;
    ctx.fillRect(x0, fillTop, w, fillH);
    // water ripples
    ctx.fillStyle = PAL.riverDk;
    ctx.fillRect(x0, fillTop, w, 3);
    ctx.fillRect(x0, fillTop + fillH - 3, w, 3);
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1;
    const t = performance.now() * 0.001;
    for (let i = 0; i < 4; i++) {
      const yy = fillTop + 10 + i * (TILE/4) + Math.sin(t + i)*1.5;
      ctx.beginPath();
      for (let xx = x0; xx < x0 + w; xx += 16) {
        ctx.moveTo(xx, yy);
        ctx.lineTo(xx + 8, yy);
      }
      ctx.stroke();
    }
  } else if (lane.type === LANE.TRACK) {
    ctx.fillStyle = PAL.trackWood;
    ctx.fillRect(x0, fillTop, w, fillH);
    // ties
    ctx.fillStyle = PAL.trackEdge;
    for (let x = x0 + 6; x < x0 + w; x += 22) {
      ctx.fillRect(x, fillTop + 6, 14, fillH - 12);
    }
    // rails
    ctx.fillStyle = PAL.rail;
    ctx.fillRect(x0, fillTop + fillH/2 - 12, w, 4);
    ctx.fillRect(x0, fillTop + fillH/2 + 8, w, 4);
    // warning flash
    if (lane.warnT > 0) {
      const flash = (Math.sin(performance.now()*0.025) + 1) * 0.5;
      ctx.fillStyle = `rgba(255,60,40,${0.3 + 0.3*flash})`;
      ctx.fillRect(x0, fillTop, w, fillH);
    }
  }
}

function drawLaneEntities(lane) {
  if (lane.type === LANE.GRASS) {
    // decor (trees/bushes/etc)
    for (const d of lane.decor) {
      const [sx, sy] = worldToScreen(d.col, lane.rowIdx);
      const cx = sx + TILE/2;
      const cy = sy - TILE/2;
      if (d.kind === 'tree') drawTree(cx, cy, d.h, d.seed);
      else if (d.kind === 'bush') drawBush(cx, cy);
      else if (d.kind === 'mushroom') drawMushroom(cx, cy);
      else if (d.kind === 'rock') drawRock(cx, cy);
    }
  } else if (lane.type === LANE.ROAD) {
    for (const v of lane.vehicles) drawVehicle(v, lane);
  } else if (lane.type === LANE.RIVER) {
    for (const lg of lane.logs) drawLog(lg, lane);
  } else if (lane.type === LANE.TRACK) {
    if (lane.train) drawTrain(lane.train, lane);
  }
}

function drawTree(cx, cy, h, seed) {
  const trunkW = TILE * 0.18;
  const trunkH = TILE * 0.28;
  // shadow
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(cx, cy + TILE*0.32, TILE*0.32, TILE*0.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = PAL.trunk;
  ctx.fillRect(cx - trunkW/2, cy - 2, trunkW, trunkH);
  // pine triangles stacked
  const tiers = 3;
  let baseY = cy - 2;
  let baseW = TILE * (0.78 * h);
  for (let i = 0; i < tiers; i++) {
    const tw = baseW * (1 - i*0.22);
    const th = TILE * 0.42 * h;
    ctx.fillStyle = i === tiers-1 ? PAL.pineLt : PAL.pineDk;
    ctx.beginPath();
    ctx.moveTo(cx - tw/2, baseY);
    ctx.lineTo(cx + tw/2, baseY);
    ctx.lineTo(cx, baseY - th);
    ctx.closePath();
    ctx.fill();
    baseY -= th * 0.55;
  }
}
function drawBush(cx, cy) {
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(cx, cy + TILE*0.18, TILE*0.22, TILE*0.07, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = PAL.bush;
  ctx.beginPath(); ctx.arc(cx - 7, cy + 4, TILE*0.18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 7, cy + 6, TILE*0.16, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx,    cy - 2, TILE*0.18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.beginPath(); ctx.arc(cx-2, cy-6, TILE*0.07, 0, Math.PI*2); ctx.fill();
}
function drawMushroom(cx, cy) {
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(cx, cy + TILE*0.18, TILE*0.14, TILE*0.05, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = PAL.shroomStem;
  ctx.fillRect(cx - 4, cy, 8, 12);
  ctx.fillStyle = PAL.shroomCap;
  ctx.beginPath(); ctx.ellipse(cx, cy, TILE*0.18, TILE*0.12, 0, Math.PI, 2*Math.PI); ctx.fill();
  ctx.fillStyle = '#fff';
  for (let i=0;i<3;i++) {
    ctx.beginPath(); ctx.arc(cx - 8 + i*8, cy - 4, 2, 0, Math.PI*2); ctx.fill();
  }
}
function drawRock(cx, cy) {
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(cx, cy + TILE*0.18, TILE*0.16, TILE*0.06, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = PAL.rock;
  ctx.beginPath(); ctx.ellipse(cx, cy + 2, TILE*0.18, TILE*0.13, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.ellipse(cx - 4, cy - 2, TILE*0.07, TILE*0.04, 0, 0, Math.PI*2); ctx.fill();
}

function drawVehicle(v, lane) {
  const [sx, sy] = worldToScreen(v.x, lane.rowIdx);
  const cx = sx + TILE/2;
  const cy = sy - TILE/2;
  const w = v.w * TILE;
  const h = v.h * TILE;
  // shadow
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(cx, cy + h*0.45, w*0.5, h*0.18, 0, 0, Math.PI*2); ctx.fill();

  if (v.type === 'truck') {
    // cab
    const cabW = w * 0.34;
    const bedW = w * 0.66;
    const totalW = w;
    const dir = lane.dir;
    const cabX = dir > 0 ? cx + totalW/2 - cabW : cx - totalW/2;
    const bedX = dir > 0 ? cx - totalW/2 : cx - totalW/2 + cabW;
    // bed (cargo with logs)
    ctx.fillStyle = PAL.truckBody;
    ctx.fillRect(bedX, cy - h/2, bedW, h);
    // logs stacked
    ctx.fillStyle = PAL.log;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.ellipse(bedX + bedW*0.5, cy - h/2 + 6 + i*7, bedW*0.42, 5, 0, 0, Math.PI*2);
      ctx.fill();
    }
    // cab
    ctx.fillStyle = v.color;
    roundRect(cabX, cy - h/2, cabW, h, 6, true, false);
    // window
    ctx.fillStyle = PAL.window;
    roundRect(cabX + (dir>0?2:cabW-cabW*0.5-2), cy - h/2 + 4, cabW*0.5, h*0.45, 3, true, false);
    // wheels
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx - w*0.35, cy + h*0.4, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + w*0.35, cy + h*0.4, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx - w*0.05, cy + h*0.4, 5, 0, Math.PI*2); ctx.fill();
  } else if (v.type === 'atv') {
    ctx.fillStyle = v.color;
    roundRect(cx - w/2, cy - h/2 + 4, w, h - 6, 6, true, false);
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - w*0.18, cy - h/2 - 4, w*0.36, 10);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx - w*0.35, cy + h*0.35, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + w*0.35, cy + h*0.35, 6, 0, Math.PI*2); ctx.fill();
    // headlight
    ctx.fillStyle = '#fff8c8';
    const hx = lane.dir > 0 ? cx + w/2 - 4 : cx - w/2 + 4;
    ctx.beginPath(); ctx.arc(hx, cy, 3, 0, Math.PI*2); ctx.fill();
  } else if (v.type === 'roller') {
    // rolling log
    ctx.fillStyle = PAL.log;
    roundRect(cx - w/2, cy - h/2 + 2, w, h - 4, 8, true, false);
    ctx.strokeStyle = PAL.logDk;
    ctx.lineWidth = 2;
    const spin = (performance.now() * 0.005 + v.x) % 6;
    for (let i=0;i<5;i++) {
      ctx.beginPath();
      const lx = cx - w/2 + ((i*w*0.22 + spin*8) % w);
      ctx.moveTo(lx, cy - h/2 + 4);
      ctx.lineTo(lx + 4, cy + h/2 - 4);
      ctx.stroke();
    }
    // end caps
    ctx.fillStyle = PAL.logDk;
    ctx.beginPath(); ctx.ellipse(cx - w/2, cy, 4, h*0.4, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w/2, cy, 4, h*0.4, 0, 0, Math.PI*2); ctx.fill();
  }
}

function drawLog(lg, lane) {
  const [sx, sy] = worldToScreen(lg.x, lane.rowIdx);
  const cx = sx + TILE/2;
  const cy = sy - TILE/2;
  const w = lg.w * TILE;
  const h = TILE * 0.78;
  // shadow
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(cx, cy + h*0.45, w*0.5, h*0.16, 0, 0, Math.PI*2); ctx.fill();
  // log body
  ctx.fillStyle = PAL.log;
  roundRect(cx - w/2, cy - h/2 + 4, w, h - 8, 10, true, false);
  // highlight
  ctx.fillStyle = PAL.logLight;
  ctx.fillRect(cx - w/2 + 6, cy - h/2 + 8, w - 12, 4);
  // bark grooves
  ctx.strokeStyle = PAL.logDk;
  ctx.lineWidth = 1.5;
  for (let i=1;i<lg.w;i++) {
    const lx = cx - w/2 + i*TILE;
    ctx.beginPath(); ctx.moveTo(lx, cy - h/2 + 6); ctx.lineTo(lx, cy + h/2 - 6); ctx.stroke();
  }
  // end caps with rings
  ctx.fillStyle = PAL.logDk;
  ctx.beginPath(); ctx.ellipse(cx - w/2 + 2, cy, 5, h*0.36, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + w/2 - 2, cy, 5, h*0.36, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#3a2818';
  ctx.beginPath(); ctx.arc(cx - w/2 + 2, cy, 2, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx + w/2 - 2, cy, 2, 0, Math.PI*2); ctx.stroke();
  // lily pad
  if (lg.hasLily) {
    const lx = cx - w/2 + lg.lilyOffset * TILE;
    ctx.fillStyle = PAL.lily;
    ctx.beginPath(); ctx.ellipse(lx, cy - h/2 - 2, TILE*0.22, TILE*0.12, 0, 0, Math.PI*2); ctx.fill();
    if (lg.lilyHasFlower) {
      ctx.fillStyle = PAL.lilyFlower;
      ctx.beginPath(); ctx.arc(lx, cy - h/2 - 2, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(lx, cy - h/2 - 2, 1.5, 0, Math.PI*2); ctx.fill();
    }
  }
  // floating coin
  if (lg.hasCoin) {
    const cox = cx + (lg.lilyHasFlower ? -w*0.15 : w*0.15);
    drawCoin(cox, cy - h/2 - 6);
  }
}

function drawTrain(t, lane) {
  const [sx, sy] = worldToScreen(t.x, lane.rowIdx);
  const cx = sx + TILE/2 + (t.w/2)*TILE;
  const cy = sy - TILE/2;
  const w = t.w * TILE;
  const h = TILE * 0.85;
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(cx - TILE/2, cy + h*0.45, w*0.5, h*0.18, 0, 0, Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle = PAL.trainBody;
  roundRect(cx - TILE/2 - w/2, cy - h/2, w, h, 8, true, false);
  // accent stripe
  ctx.fillStyle = PAL.trainAccent;
  ctx.fillRect(cx - TILE/2 - w/2, cy - 4, w, 8);
  // car divisions
  ctx.fillStyle = '#1a1410';
  for (let i = 1; i < t.w; i++) {
    const lx = cx - TILE/2 - w/2 + i*TILE;
    ctx.fillRect(lx - 1, cy - h/2, 2, h);
  }
  // front light (in dir of motion)
  const front = lane.dir > 0 ? cx - TILE/2 + w/2 - 4 : cx - TILE/2 - w/2 + 4;
  ctx.fillStyle = '#fff8c8';
  ctx.beginPath(); ctx.arc(front, cy, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,248,200,0.2)';
  const beamX = lane.dir > 0 ? front : front - 80;
  ctx.fillRect(beamX, cy - 2, 80, 4);
}

function drawCoin(cx, cy) {
  // bobbing
  const t = performance.now() * 0.005;
  const oy = Math.sin(t + cx) * 1.5;
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(cx, cy + 8, 6, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = PAL.coin;
  ctx.beginPath(); ctx.arc(cx, cy + oy, TILE*0.13, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = PAL.coinHi;
  ctx.beginPath(); ctx.arc(cx - 2, cy - 2 + oy, TILE*0.05, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#a07030';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy + oy, TILE*0.13, 0, Math.PI*2); ctx.stroke();
}

// Beaver player
function drawPlayer() {
  const p = game.player;
  const [sx, sy] = worldToScreen(p.x, p.y);
  const cx = sx + TILE/2;
  const cy = sy - TILE/2;
  // hop arc lift
  let lift = 0, squash = 1, stretch = 1;
  if (p.hopT > 0) {
    const t = 1 - Math.max(0, p.hopT)/p.hopDur;
    lift = -Math.sin(Math.PI * t) * TILE * 0.45;
    squash = 1 + Math.sin(Math.PI * t) * 0.08;
    stretch = 1 - Math.sin(Math.PI * t) * 0.1;
  }
  // tail slap pulse
  let tailWag = 0;
  if (p.tailSlapT > 1.85 && p.hopT <= 0) {
    tailWag = Math.sin((p.tailSlapT - 1.85)*30) * 0.4;
  }
  drawBeaver(cx, cy + lift, p.facing, squash, stretch, tailWag, p.alive ? p.skin : p.skin, !p.alive);

  // swimming bubbles if in river without log
  if (p.alive && !p.onLog && p.hopT <= 0) {
    const lane = game.rows.get(p.row);
    if (lane && lane.type === LANE.RIVER) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      const bx = cx + Math.sin(performance.now()*0.01)*8;
      ctx.beginPath(); ctx.arc(bx, cy + 14, 2, 0, Math.PI*2); ctx.fill();
    }
  }
}

function skinColors(skin) {
  switch (skin) {
    case 'baby':   return { body:'#a47443', dk:'#7a5230', lt:'#d2a474', tooth:PAL.tooth, scale:0.85, accent:null };
    case 'albino': return { body:'#f3eee5', dk:'#cdc7bb', lt:'#ffffff', tooth:'#ffe4d8', accent:'pinkEye' };
    case 'zombie': return { body:'#7d8e6a', dk:'#4a5a3a', lt:'#a4b48a', tooth:'#cbd58a', accent:'zombie' };
    case 'ninja':  return { body:'#1f1f24', dk:'#0a0a0c', lt:'#3a3a44', tooth:PAL.tooth, accent:'ninja' };
    case 'cowboy': return { body:'#7a5024', dk:'#4a2f12', lt:'#b48852', tooth:PAL.tooth, accent:'cowboy' };
    default:       return { body:PAL.beaverBody, dk:PAL.beaverDk, lt:PAL.beaverLt, tooth:PAL.tooth, accent:null };
  }
}

function drawBeaver(cx, cy, facing, sq, st, tailWag, skin, dead) {
  const sc = skinColors(skin);
  const scale = sc.scale || 1;
  const W = TILE * 0.62 * scale * sq;
  const H = TILE * 0.62 * scale * st;
  // shadow
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(cx, cy + H*0.55, W*0.55, H*0.16, 0, 0, Math.PI*2); ctx.fill();
  // tail (behind body)
  ctx.save();
  ctx.translate(cx, cy + H*0.18);
  ctx.rotate(tailWag);
  ctx.fillStyle = sc.dk;
  roundRect(-W*0.55, -H*0.18, W*0.5, H*0.36, 6, true, false);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  for (let i=0;i<3;i++) {
    ctx.fillRect(-W*0.55 + 4 + i*8, -H*0.16, 1.5, H*0.32);
    ctx.fillRect(-W*0.55 + 8 + i*8, -H*0.16, 1.5, H*0.32);
  }
  ctx.restore();
  // body
  ctx.fillStyle = sc.body;
  roundRect(cx - W/2, cy - H/2, W, H, 12, true, false);
  // belly
  ctx.fillStyle = sc.lt;
  roundRect(cx - W*0.28, cy + H*0.05, W*0.56, H*0.42, 10, true, false);
  // ears
  ctx.fillStyle = sc.dk;
  ctx.beginPath(); ctx.arc(cx - W*0.32, cy - H*0.42, W*0.11, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + W*0.32, cy - H*0.42, W*0.11, 0, Math.PI*2); ctx.fill();
  // head front
  ctx.fillStyle = sc.body;
  roundRect(cx - W*0.36, cy - H*0.55, W*0.72, H*0.42, 10, true, false);
  // muzzle
  ctx.fillStyle = sc.lt;
  roundRect(cx - W*0.22, cy - H*0.28, W*0.44, H*0.22, 8, true, false);
  // teeth
  ctx.fillStyle = sc.tooth;
  ctx.fillRect(cx - W*0.08, cy - H*0.12, W*0.07, H*0.16);
  ctx.fillRect(cx + W*0.01, cy - H*0.12, W*0.07, H*0.16);
  ctx.strokeStyle = '#a0824a';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - W*0.08, cy - H*0.12, W*0.07, H*0.16);
  ctx.strokeRect(cx + W*0.01, cy - H*0.12, W*0.07, H*0.16);
  // eyes
  if (sc.accent === 'pinkEye') {
    ctx.fillStyle = '#d65a7a';
    ctx.beginPath(); ctx.arc(cx - W*0.18, cy - H*0.4, W*0.07, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + W*0.18, cy - H*0.4, W*0.07, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx - W*0.18, cy - H*0.4, W*0.03, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + W*0.18, cy - H*0.4, W*0.03, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - W*0.18, cy - H*0.4, W*0.08, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + W*0.18, cy - H*0.4, W*0.08, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(cx - W*0.18, cy - H*0.4, W*0.04, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + W*0.18, cy - H*0.4, W*0.04, 0, Math.PI*2); ctx.fill();
  }
  // nose
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(cx, cy - H*0.22, W*0.06, 0, Math.PI*2); ctx.fill();

  // accents
  if (sc.accent === 'ninja') {
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(cx - W*0.36, cy - H*0.42, W*0.72, H*0.12);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - W*0.16, cy - H*0.36, W*0.10, H*0.04);
    ctx.fillRect(cx + W*0.06, cy - H*0.36, W*0.10, H*0.04);
  } else if (sc.accent === 'cowboy') {
    ctx.fillStyle = '#3a261a';
    ctx.fillRect(cx - W*0.5, cy - H*0.55, W, H*0.08);
    ctx.fillStyle = '#5a3a24';
    roundRect(cx - W*0.28, cy - H*0.7, W*0.56, H*0.18, 6, true, false);
    ctx.fillStyle = '#3a261a';
    ctx.fillRect(cx - W*0.28, cy - H*0.55, W*0.56, H*0.04);
  } else if (sc.accent === 'zombie') {
    // stitches
    ctx.strokeStyle = '#2a2a1a'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - W*0.1, cy - H*0.1);
    ctx.lineTo(cx + W*0.2, cy - H*0.05);
    ctx.stroke();
    for (let i=0;i<4;i++) {
      ctx.beginPath();
      ctx.moveTo(cx - W*0.05 + i*W*0.07, cy - H*0.13);
      ctx.lineTo(cx - W*0.05 + i*W*0.07, cy - H*0.05);
      ctx.stroke();
    }
  }

  // dead overlay
  if (dead) {
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(cx - W/2, cy - H/2, W, H);
    if (game.lastDeath && game.lastDeath.cause === 'truck') {
      // X eyes
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
      [-1,1].forEach(s => {
        const ex = cx + s*W*0.18, ey = cy - H*0.4;
        ctx.beginPath(); ctx.moveTo(ex-3,ey-3); ctx.lineTo(ex+3,ey+3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ex-3,ey+3); ctx.lineTo(ex+3,ey-3); ctx.stroke();
      });
    }
  }
}

function drawEagle(e) {
  const [sx, sy] = worldToScreen(e.x, e.y);
  const cx = sx, cy = sy;
  const w = TILE * 1.4, h = TILE * 0.6;
  // shadow on ground
  const [gx, gy] = worldToScreen(e.x, game.player.y);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(gx, gy - TILE*0.4, TILE*0.4, TILE*0.12, 0, 0, Math.PI*2); ctx.fill();
  // body
  ctx.save();
  ctx.translate(cx, cy);
  // wings flap
  const flap = Math.sin(performance.now()*0.018) * 0.3;
  ctx.fillStyle = '#3a2a1a';
  // left wing
  ctx.save(); ctx.rotate(-0.4 + flap);
  ctx.beginPath(); ctx.ellipse(-w*0.3, 0, w*0.4, h*0.2, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // right wing
  ctx.save(); ctx.rotate(0.4 - flap);
  ctx.beginPath(); ctx.ellipse(w*0.3, 0, w*0.4, h*0.2, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // body
  ctx.fillStyle = '#5a3a24';
  ctx.beginPath(); ctx.ellipse(0, 4, w*0.15, h*0.4, 0, 0, Math.PI*2); ctx.fill();
  // head white
  ctx.fillStyle = '#f5f0e6';
  ctx.beginPath(); ctx.arc(0, -h*0.15, w*0.09, 0, Math.PI*2); ctx.fill();
  // beak
  ctx.fillStyle = '#f0c040';
  ctx.beginPath();
  ctx.moveTo(-3, -h*0.1); ctx.lineTo(3, -h*0.1); ctx.lineTo(0, -h*0.02); ctx.closePath(); ctx.fill();
  // eye
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(2, -h*0.18, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// =====================================================================
// HUD & menus
// =====================================================================
function drawHUD() {
  const top = safeTop();
  // score top center
  ctx.font = `900 ${Math.floor(TILE*0.7)}px ui-rounded, system-ui`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.fillStyle = '#fff';
  ctx.strokeText(String(game.score), CW/2, top + 8);
  ctx.fillText(String(game.score), CW/2, top + 8);

  // coin top left
  drawCoin(safeLeft() + 22, top + 22);
  ctx.font = `800 ${Math.floor(TILE*0.34)}px ui-rounded, system-ui`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.fillStyle = '#fff1a8';
  ctx.strokeText(String(game.coins), safeLeft() + 38, top + 22);
  ctx.fillText(String(game.coins), safeLeft() + 38, top + 22);
}

function drawMenu() {
  // dim
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.fillRect(0, 0, CW, CH);
  // title
  const cx = CW/2, cy = CH*0.30;
  ctx.font = `900 ${Math.floor(TILE*1.15)}px ui-rounded, system-ui`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 8; ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.fillStyle = '#f5c842';
  const title = 'DAM RUSH';
  ctx.strokeText(title, cx, cy);
  ctx.fillText(title, cx, cy);
  // sub
  ctx.font = `700 ${Math.floor(TILE*0.32)}px ui-rounded, system-ui`;
  ctx.fillStyle = '#fff';
  ctx.strokeText('Hop to your dam. Don\'t become roadkill.', cx, cy + TILE*0.7);
  ctx.fillText('Hop to your dam. Don\'t become roadkill.', cx, cy + TILE*0.7);

  // beaver on log
  const bx = cx, by = CH * 0.55;
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath(); ctx.ellipse(bx, by + TILE*0.5, TILE*1.2, TILE*0.16, 0, 0, Math.PI*2); ctx.fill();
  // log
  ctx.fillStyle = PAL.log;
  roundRect(bx - TILE*1.2, by + TILE*0.18, TILE*2.4, TILE*0.5, 16, true, false);
  ctx.fillStyle = PAL.logLight;
  ctx.fillRect(bx - TILE*1.2 + 8, by + TILE*0.22, TILE*2.4 - 16, 4);
  ctx.fillStyle = PAL.logDk;
  ctx.beginPath(); ctx.ellipse(bx - TILE*1.2 + 4, by + TILE*0.43, 6, TILE*0.22, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + TILE*1.2 - 4, by + TILE*0.43, 6, TILE*0.22, 0, 0, Math.PI*2); ctx.fill();
  drawBeaver(bx, by - TILE*0.1, 'up', 1, 1, Math.sin(performance.now()*0.005)*0.3, save.selected, false);

  // tap to play prompt (pulsing)
  const pulse = (Math.sin(performance.now()*0.005) + 1) * 0.5;
  ctx.font = `900 ${Math.floor(TILE*0.55)}px ui-rounded, system-ui`;
  ctx.fillStyle = `rgba(255,255,255,${0.6 + 0.4*pulse})`;
  ctx.strokeText('TAP TO PLAY', cx, CH * 0.74);
  ctx.fillText('TAP TO PLAY', cx, CH * 0.74);

  // bottom buttons
  drawMenuButton('CHARACTERS', CW*0.28, CH - safeBottom() - TILE*1.0, TILE*3.4, TILE*0.9);
  drawMenuButton('HIGH: ' + save.highScore, CW*0.72, CH - safeBottom() - TILE*1.0, TILE*3.4, TILE*0.9, '#3a4a30');
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, CW, CH);
  const cx = CW/2;
  // cause icon area
  const cause = game.lastDeath ? game.lastDeath.cause : 'unknown';
  const causeText = {
    truck:  'SQUISHED!',
    splash: 'GLUB GLUB...',
    eagle:  'SNATCHED!',
    train:  'OFF THE RAILS!',
  }[cause] || 'GAME OVER';
  ctx.font = `900 ${Math.floor(TILE*0.85)}px ui-rounded, system-ui`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 8; ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.fillStyle = '#ff6b3a';
  ctx.strokeText(causeText, cx, CH*0.22);
  ctx.fillText(causeText, cx, CH*0.22);

  // illustration
  drawDeathIllustration(cx, CH*0.42, cause);

  // score
  ctx.font = `800 ${Math.floor(TILE*0.4)}px ui-rounded, system-ui`;
  ctx.fillStyle = '#fff';
  ctx.strokeText('SCORE  ' + game.score, cx, CH*0.58);
  ctx.fillText('SCORE  ' + game.score, cx, CH*0.58);
  ctx.fillStyle = '#fff1a8';
  ctx.strokeText('BEST  ' + save.highScore, cx, CH*0.62);
  ctx.fillText('BEST  ' + save.highScore, cx, CH*0.62);

  drawMenuButton('PLAY AGAIN', cx, CH*0.74, TILE*4.6, TILE*1.0, '#5e8c3a');
  drawMenuButton('MAIN MENU', cx, CH*0.84, TILE*4.6, TILE*0.9, '#3a4a30');
}

function drawDeathIllustration(cx, cy, cause) {
  if (cause === 'truck') {
    // squished beaver: very flat
    ctx.save(); ctx.translate(cx, cy);
    ctx.scale(1.4, 0.4);
    drawBeaver(0, 0, 'up', 1, 1, 0, save.selected, true);
    ctx.restore();
    // tire mark
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - TILE*1.2, cy + TILE*0.15, TILE*2.4, 4);
    ctx.fillRect(cx - TILE*1.2, cy + TILE*0.05, TILE*2.4, 4);
  } else if (cause === 'splash') {
    // wet beaver in water
    ctx.fillStyle = PAL.river;
    roundRect(cx - TILE*1.5, cy - TILE*0.3, TILE*3, TILE*0.8, 8, true, false);
    ctx.fillStyle = PAL.riverDk;
    ctx.fillRect(cx - TILE*1.5, cy - TILE*0.3, TILE*3, 4);
    drawBeaver(cx, cy - TILE*0.1, 'up', 1, 0.9, 0, save.selected, true);
    // water above
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i=0;i<6;i++) {
      ctx.beginPath();
      ctx.arc(cx - TILE + i*TILE*0.4, cy + TILE*0.1, 3, 0, Math.PI*2); ctx.fill();
    }
  } else if (cause === 'eagle') {
    // eagle carrying beaver
    drawEagleCarrying(cx, cy);
  } else if (cause === 'train') {
    ctx.fillStyle = PAL.trainBody;
    roundRect(cx - TILE*1.6, cy - TILE*0.25, TILE*3.2, TILE*0.7, 8, true, false);
    ctx.fillStyle = PAL.trainAccent;
    ctx.fillRect(cx - TILE*1.6, cy - 4, TILE*3.2, 6);
    // dazed beaver
    drawBeaver(cx, cy + TILE*0.6, 'up', 1, 0.9, 0, save.selected, true);
    // stars around
    ctx.fillStyle = '#f5c842';
    ctx.font = `700 ${Math.floor(TILE*0.35)}px ui-rounded, system-ui`;
    ctx.fillText('✶', cx - TILE*0.5, cy + TILE*0.3);
    ctx.fillText('✶', cx + TILE*0.5, cy + TILE*0.4);
    ctx.fillText('★', cx, cy + TILE*0.2);
  }
}
function drawEagleCarrying(cx, cy) {
  // simplified eagle big
  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath(); ctx.ellipse(-TILE*0.7, 0, TILE*0.6, TILE*0.18, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(TILE*0.7, 0, TILE*0.6, TILE*0.18, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3a24';
  ctx.beginPath(); ctx.ellipse(0, 8, TILE*0.25, TILE*0.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f5f0e6';
  ctx.beginPath(); ctx.arc(0, -TILE*0.25, TILE*0.18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0c040';
  ctx.beginPath();
  ctx.moveTo(-6, -TILE*0.18); ctx.lineTo(6, -TILE*0.18); ctx.lineTo(0, -TILE*0.04); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(4, -TILE*0.28, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // dangling beaver with X eyes
  drawBeaver(cx, cy + TILE*0.7, 'up', 1, 0.95, 0, save.selected, true);
}

function drawSelect() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, CW, CH);
  const cx = CW/2;
  ctx.font = `900 ${Math.floor(TILE*0.7)}px ui-rounded, system-ui`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.fillStyle = '#fff';
  ctx.strokeText('CHARACTERS', cx, safeTop() + TILE*0.6);
  ctx.fillText('CHARACTERS', cx, safeTop() + TILE*0.6);

  // grid of beavers
  const all = ['default','baby','albino','zombie','ninja','cowboy'];
  const cols = 3;
  const cellW = Math.min(TILE*1.7, (CW - safeLeft() - safeRight() - 40) / cols);
  const cellH = cellW * 1.05;
  const startX = (CW - cellW*cols)/2 + cellW/2;
  const startY = safeTop() + TILE*1.6;
  charButtons.length = 0;
  all.forEach((name, i) => {
    const r = Math.floor(i/cols), c = i%cols;
    const bx = startX + c*cellW;
    const by = startY + r*cellH;
    const owned = save.unlocked.includes(name);
    const selected = save.selected === name;
    // bg
    ctx.fillStyle = selected ? 'rgba(245,200,66,0.25)' : 'rgba(255,255,255,0.08)';
    roundRect(bx - cellW*0.45, by - cellH*0.45, cellW*0.9, cellH*0.9, 14, true, false);
    if (selected) {
      ctx.strokeStyle = '#f5c842'; ctx.lineWidth = 3;
      roundRect(bx - cellW*0.45, by - cellH*0.45, cellW*0.9, cellH*0.9, 14, false, true);
    }
    if (owned) {
      drawBeaver(bx, by - cellH*0.05, 'up', 1, 1, 0, name, false);
    } else {
      // silhouette
      ctx.save();
      ctx.globalAlpha = 0.18;
      drawBeaver(bx, by - cellH*0.05, 'up', 1, 1, 0, name, false);
      ctx.restore();
      ctx.fillStyle = '#fff';
      ctx.font = `900 ${Math.floor(cellW*0.45)}px ui-rounded, system-ui`;
      ctx.fillText('?', bx, by - cellH*0.05);
    }
    // label
    ctx.font = `700 ${Math.floor(cellW*0.13)}px ui-rounded, system-ui`;
    ctx.fillStyle = owned ? '#fff' : '#aaa';
    ctx.fillText(charLabel(name), bx, by + cellH*0.32);
    charButtons.push({ name, x: bx - cellW*0.45, y: by - cellH*0.45, w: cellW*0.9, h: cellH*0.9, owned });
  });

  // spin button
  const spinY = startY + Math.ceil(all.length/cols)*cellH + TILE*0.3;
  const allOwned = all.every(n => save.unlocked.includes(n));
  if (allOwned) {
    ctx.font = `800 ${Math.floor(TILE*0.4)}px ui-rounded, system-ui`;
    ctx.fillStyle = '#f5c842';
    ctx.strokeText('FULL LODGE — All beavers unlocked!', cx, spinY);
    ctx.fillText('FULL LODGE — All beavers unlocked!', cx, spinY);
  } else {
    drawSpinButton(cx, spinY);
  }
  // close
  drawMenuButton('CLOSE', cx, CH - safeBottom() - TILE*0.8, TILE*3.6, TILE*0.9, '#3a4a30');

  // spin animation overlay
  if (game.spinAnim > 0) {
    drawSpinAnim();
  }
}

function charLabel(n) {
  return ({ default:'CLASSIC', baby:'BABY', albino:'ALBINO', zombie:'ZOMBIE', ninja:'NINJA', cowboy:'COWBOY' })[n];
}

const SPIN_COST = 30;
function drawSpinButton(cx, cy) {
  const w = TILE*5.2, h = TILE*1.0;
  ctx.fillStyle = save.coins >= SPIN_COST ? '#5e8c3a' : '#3a3a3a';
  roundRect(cx - w/2, cy - h/2, w, h, 14, true, false);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 3;
  roundRect(cx - w/2, cy - h/2, w, h, 14, false, true);
  ctx.font = `900 ${Math.floor(TILE*0.42)}px ui-rounded, system-ui`;
  ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.strokeText(`SPIN  (${SPIN_COST}🪙)`, cx, cy);
  ctx.fillText(`SPIN  (${SPIN_COST}🪙)`, cx, cy);
  spinBtn = { x: cx - w/2, y: cy - h/2, w, h };
}

function drawSpinAnim() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,CW,CH);
  const cx = CW/2, cy = CH/2;
  // capsule
  ctx.fillStyle = '#f5c842';
  ctx.beginPath(); ctx.arc(cx, cy, TILE*1.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, TILE*1.4, 0, Math.PI*2); ctx.fill();
  if (game.spinAnim > 0.4) {
    // spinning
    const t = (1 - game.spinAnim) * 30;
    const all = ['default','baby','albino','zombie','ninja','cowboy'];
    const which = all[Math.floor(t) % all.length];
    drawBeaver(cx, cy + 4, 'up', 1, 1, 0, which, false);
  } else {
    // result
    drawBeaver(cx, cy + 4, 'up', 1.05, 1.05, 0, game.spinResult, false);
    ctx.font = `900 ${Math.floor(TILE*0.5)}px ui-rounded, system-ui`;
    ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,0.7)';
    ctx.strokeText(charLabel(game.spinResult).toUpperCase() + '!', cx, cy + TILE*1.9);
    ctx.fillText(charLabel(game.spinResult) + '!', cx, cy + TILE*1.9);
  }
}

let charButtons = [];
let spinBtn = null;

function drawMenuButton(text, cx, cy, w, h, color) {
  ctx.fillStyle = color || '#5e8c3a';
  roundRect(cx - w/2, cy - h/2, w, h, 14, true, false);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 3;
  roundRect(cx - w/2, cy - h/2, w, h, 14, false, true);
  ctx.font = `900 ${Math.floor(h*0.42)}px ui-rounded, system-ui`;
  ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.strokeText(text, cx, cy);
  ctx.fillText(text, cx, cy);
}

function safeTop() {
  return parseFloat(getComputedStyle(document.getElementById('wrap')).paddingTop) || 0;
}
function safeBottom() {
  return parseFloat(getComputedStyle(document.getElementById('wrap')).paddingBottom) || 0;
}
function safeLeft() { return parseFloat(getComputedStyle(document.getElementById('wrap')).paddingLeft) || 0; }
function safeRight() { return parseFloat(getComputedStyle(document.getElementById('wrap')).paddingRight) || 0; }

function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

// =====================================================================
// Input
// =====================================================================
let touchStart = null;
const SWIPE_DIST = 22; // px
function onPointerDown(e) {
  e.preventDefault();
  ensureAudio();
  const pt = pointerXY(e);
  touchStart = { ...pt, t: performance.now() };
}
function onPointerUp(e) {
  e.preventDefault();
  if (!touchStart) return;
  const pt = pointerXY(e);
  const dx = pt.x - touchStart.x;
  const dy = pt.y - touchStart.y;
  const dist = Math.hypot(dx, dy);

  if (state === STATE.MENU) {
    if (handleMenuClick(pt.x, pt.y)) { touchStart = null; return; }
    // tap to play
    state = STATE.PLAYING;
    initWorld();
    touchStart = null;
    return;
  }
  if (state === STATE.DEAD) {
    if (handleDeadClick(pt.x, pt.y)) { touchStart = null; return; }
    return;
  }
  if (state === STATE.SELECT) {
    handleSelectClick(pt.x, pt.y);
    touchStart = null;
    return;
  }

  // PLAYING
  if (dist < SWIPE_DIST) {
    tryMove(1, 0, 'up'); // tap = forward
  } else {
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0) tryMove(0, 1, 'right'); else tryMove(0, -1, 'left');
    } else {
      if (dy > 0) tryMove(-1, 0, 'down'); else tryMove(1, 0, 'up');
    }
  }
  touchStart = null;
}
function pointerXY(e) {
  const r = canvas.getBoundingClientRect();
  if (e.changedTouches && e.changedTouches[0]) {
    return { x: e.changedTouches[0].clientX - r.left, y: e.changedTouches[0].clientY - r.top };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchend',   onPointerUp,   { passive: false });
canvas.addEventListener('mousedown',  onPointerDown);
canvas.addEventListener('mouseup',    onPointerUp);

window.addEventListener('keydown', (e) => {
  ensureAudio();
  if (state === STATE.MENU && (e.key === ' ' || e.key === 'Enter')) {
    state = STATE.PLAYING; initWorld(); return;
  }
  if (state === STATE.DEAD && (e.key === ' ' || e.key === 'Enter')) {
    state = STATE.PLAYING; initWorld(); return;
  }
  if (state !== STATE.PLAYING) return;
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') tryMove(1, 0, 'up');
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') tryMove(-1, 0, 'down');
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') tryMove(0, -1, 'left');
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') tryMove(0, 1, 'right');
});

function inRect(x, y, r) {
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}
function handleMenuClick(x, y) {
  // characters button
  const charBtn = { x: CW*0.28 - TILE*1.7, y: CH - safeBottom() - TILE*1.45, w: TILE*3.4, h: TILE*0.9 };
  const hsBtn   = { x: CW*0.72 - TILE*1.7, y: CH - safeBottom() - TILE*1.45, w: TILE*3.4, h: TILE*0.9 };
  if (inRect(x, y, charBtn)) { state = STATE.SELECT; return true; }
  if (inRect(x, y, hsBtn)) { return true; } // no-op for now
  return false;
}
function handleDeadClick(x, y) {
  const playBtn = { x: CW/2 - TILE*2.3, y: CH*0.74 - TILE*0.5, w: TILE*4.6, h: TILE*1.0 };
  const menuBtn = { x: CW/2 - TILE*2.3, y: CH*0.84 - TILE*0.45, w: TILE*4.6, h: TILE*0.9 };
  if (inRect(x, y, playBtn)) { state = STATE.PLAYING; initWorld(); return true; }
  if (inRect(x, y, menuBtn)) { state = STATE.MENU; return true; }
  return false;
}
function handleSelectClick(x, y) {
  if (game.spinAnim > 0) return;
  // close
  const closeBtn = { x: CW/2 - TILE*1.8, y: CH - safeBottom() - TILE*1.25, w: TILE*3.6, h: TILE*0.9 };
  if (inRect(x, y, closeBtn)) { state = STATE.MENU; return; }
  if (spinBtn && inRect(x, y, spinBtn)) {
    if (save.coins >= SPIN_COST) {
      save.coins -= SPIN_COST;
      doSpin();
    }
    return;
  }
  for (const b of charButtons) {
    if (inRect(x, y, b) && b.owned) {
      save.selected = b.name;
      persist();
      return;
    }
  }
}
function doSpin() {
  const all = ['default','baby','albino','zombie','ninja','cowboy'];
  const locked = all.filter(n => !save.unlocked.includes(n));
  let pick;
  if (locked.length === 0) {
    pick = all[Math.floor(Math.random()*all.length)];
  } else {
    pick = locked[Math.floor(Math.random()*locked.length)];
    save.unlocked.push(pick);
    if (save.unlocked.length === all.length) save.ach.fullLodge = true;
  }
  game.spinResult = pick;
  game.spinAnim = 1.4;
  sfx.spin();
  setTimeout(() => sfx.unlock(), 1100);
  persist();
}

// =====================================================================
// Main loop
// =====================================================================
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.04, (now - lastT) / 1000);
  lastT = now;
  update(dt);
  // tick spin anim
  if (game.spinAnim > 0) game.spinAnim = Math.max(0, game.spinAnim - dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Initialize starting world for menu background
initWorld();
state = STATE.MENU;

// Visibility resume
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) lastT = performance.now();
});

</script>
